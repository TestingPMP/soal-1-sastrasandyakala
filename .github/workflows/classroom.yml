name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "6 5 -1 7 -1 -1 4"
          expected-output: |-
            RECOVERED 5 6 7 5 4 4
            MAX_SUM 31
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - tanpa data hilang
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - tanpa data hilang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "5 1 2 3 4 5"
          expected-output: |-
            RECOVERED 1 2 3 4 5
            MAX_SUM 15
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - semua data hilang
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - semua data hilang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 -1 -1 -1 -1"
          expected-output: |-
            RECOVERED 0 0 0 0
            MAX_SUM 0
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - hanya kanan ada
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - hanya kanan ada
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 -1 -1 8 2"
          expected-output: |-
            RECOVERED 8 8 8 2
            MAX_SUM 26
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - hanya kiri ada
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - hanya kiri ada
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 8 2 -1 -1"
          expected-output: |-
            RECOVERED 8 2 2 2
            MAX_SUM 14
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - dua sisi ada, floor average
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - dua sisi ada, floor average
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 5 -1 8"
          expected-output: |-
            RECOVERED 5 6 8
            MAX_SUM 19
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - banyak negatif setelah pulih
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - banyak negatif setelah pulih
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "5 -5 -1 -2 -1 -4"
          expected-output: |-
            RECOVERED -5 -4 -2 -3 -4
            MAX_SUM -2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - campuran nol dan negatif
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - campuran nol dan negatif
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "6 0 -1 -3 -1 2 -1"
          expected-output: |-
            RECOVERED 0 -2 -3 -1 2 2
            MAX_SUM 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - single element hilang
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - single element hilang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1 -1"
          expected-output: |-
            RECOVERED 0
            MAX_SUM 0
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - beberapa hilang beruntun
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - beberapa hilang beruntun
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "7 10 -1 -1 4 -1 6 -1"
          expected-output: |-
            RECOVERED 10 7 5 4 5 6 6
            MAX_SUM 43
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10